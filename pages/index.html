<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>epubCreator · Manage Projects</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/icons/icon-transparent.png" type="image/png">
    <link rel="manifest" href="../assets/code/manifest.json">
    <script>
      if (typeof navigator.serviceWorker !== 'undefined') {
        navigator.serviceWorker.register('sw.js')
      }
    </script>
    <style>
        /* ========== SUPERROUNDED UI (SRUI) CORE - DARK ONLY ========== */
        :root {
            --srui-accent: #ffce00;
            --srui-background: #1B1C1E;
            --srui-card: #0f0f0f;
            --srui-text: #ffffff;
            --srui-accent-text: #000000;
            --srui-border: #4B4F50;
            --srui-text-secondary: #999999;
            --srui-text-tertiary: #666666;
            --srui-success: #4CAF50;
            --srui-error: #F44336;
            
            --srui-font-primary: 'Outfit', system-ui, -apple-system, sans-serif;
            --srui-radius-sm: 12px;
            --srui-radius-md: 18px;
            --srui-radius-lg: 28px;
            --srui-radius-pill: 9999px;
            
            --srui-space-1: 0.25rem;
            --srui-space-2: 0.5rem;
            --srui-space-3: 0.75rem;
            --srui-space-4: 1rem;
            --srui-space-6: 1.5rem;
            --srui-space-8: 2rem;
            --srui-space-12: 3rem;
            
            --srui-shadow-card: 0 8px 20px rgba(0,0,0,0.6);
            --srui-shadow-raised: 0 4px 12px rgba(0,0,0,0.5);
            
            --srui-duration-fast: 0.1s;
            --srui-easing-press: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --srui-hover-scale: 0.97;
            --srui-active-scale: 0.94;
            
            --srui-z-modal: 300;
            --srui-z-toast: 400;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--srui-background);
            color: var(--srui-text);
            font-family: var(--srui-font-primary);
            line-height: 1.5;
            padding: var(--srui-space-4);
            min-height: 100vh;
        }
        
        :focus-visible {
            outline: 2px solid var(--srui-accent);
            outline-offset: 2px;
            border-radius: var(--srui-radius-sm);
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--srui-space-6);
            flex-wrap: wrap;
            gap: var(--srui-space-3);
        }
        
        .header-img {
            max-height: 2.8em;
            filter: brightness(1.05);
        }
        
        .btn-new {
            background: var(--srui-accent);
            color: var(--srui-accent-text);
            border: none;
            padding: 12px 24px;
            border-radius: var(--srui-radius-pill);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform var(--srui-duration-fast) var(--srui-easing-press);
            font-size: 0.95rem;
            letter-spacing: -0.2px;
        }
        
        .btn-new:active {
            transform: scale(var(--srui-active-scale));
        }
        
        /* Stat cards */
        .stats {
            display: flex;
            gap: var(--srui-space-4);
            margin-bottom: var(--srui-space-8);
        }
        
        .stat-card {
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: var(--srui-space-4) var(--srui-space-6);
            flex: 1;
            text-align: center;
            box-shadow: var(--srui-shadow-card);
            border: 1px solid rgba(75, 79, 80, 0.3);
            transition: transform 0.1s;
        }
        
        .stat-card:active {
            transform: scale(0.98);
        }
        
        .stat-number {
            font-size: 2.4rem;
            font-weight: 800;
            color: var(--srui-accent);
            line-height: 1.2;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--srui-text-secondary);
            letter-spacing: 0.3px;
        }
        
        /* Project grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: var(--srui-space-6);
            margin-top: var(--srui-space-2);
        }
        
        .project-card {
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 1px solid rgba(75, 79, 80, 0.4);
            transition: transform var(--srui-duration-fast) var(--srui-easing-press);
            box-shadow: var(--srui-shadow-card);
        }
        
        .project-card:active {
            transform: scale(var(--srui-active-scale));
        }
        
        .project-cover {
            aspect-ratio: 2 / 2.5;
            background: #1a1a1c;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .project-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .cover-placeholder {
            font-size: 2.8rem;
            color: var(--srui-accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }
        
        .cover-placeholder i {
            font-size: 2.4rem;
        }
        
        .project-info {
            padding: var(--srui-space-3) var(--srui-space-3) var(--srui-space-4);
        }
        
        .project-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }
        
        .project-meta {
            font-size: 0.7rem;
            color: var(--srui-text-secondary);
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        /* menu dots (three dots) */
        .menu-dots {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            width: 36px;
            height: 36px;
            border-radius: var(--srui-radius-pill);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.05s linear;
        }
        
        .menu-dots:active {
            transform: scale(0.92);
            background: rgba(0,0,0,0.85);
        }
        
        .menu-dots i {
            color: white;
            font-size: 1.2rem;
        }
        
        /* Popup delete */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: var(--srui-z-modal);
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        
        .popup-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        
        .popup-card {
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: var(--srui-space-6);
            width: 280px;
            text-align: center;
            border: 1px solid var(--srui-border);
            box-shadow: var(--srui-shadow-raised);
        }
        
        .popup-card i {
            font-size: 2.2rem;
            color: var(--srui-error);
            margin-bottom: 12px;
        }
        
        .popup-card h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        
        .popup-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .popup-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: var(--srui-radius-pill);
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.05s linear;
            font-family: var(--srui-font-primary);
        }
        
        .popup-buttons button:active {
            transform: scale(0.96);
        }
        
        .btn-confirm {
            background: var(--srui-error);
            color: white;
        }
        
        .btn-cancel {
            background: #2c2c30;
            color: var(--srui-text);
            border: 1px solid var(--srui-border);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            color: var(--srui-text-secondary);
            grid-column: 1 / -1;
            border: 1px dashed var(--srui-border);
        }
        
        .empty-state i {
            font-size: 3rem;
            color: var(--srui-accent);
            margin-bottom: 16px;
            opacity: 0.7;
        }
        
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--srui-text-tertiary);
            margin-top: var(--srui-space-12);
            padding-bottom: var(--srui-space-4);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--srui-accent);
            color: var(--srui-accent-text);
            padding: 10px 20px;
            border-radius: var(--srui-radius-pill);
            font-size: 0.85rem;
            font-weight: 700;
            z-index: var(--srui-z-toast);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: var(--srui-shadow-raised);
        }
        
        .toast.show {
            opacity: 1;
        }
        
        @media (max-width: 560px) {
            body { padding: 12px; }
            .stats { gap: 10px; }
            .stat-card { padding: 12px 8px; }
            .stat-number { font-size: 1.8rem; }
            .project-grid { gap: 14px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
        
        /* animated pulse for loading */
        @keyframes subtlePulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img src="../assets/icons/icon-name.png" class="header-img" alt="epubCreator logo">
        <button class="btn-new" id="newProjectBtn"><i class="fas fa-plus-circle"></i> New Project</button>
    </div>
    
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalProjects">0</div><div class="stat-label">Total Projects</div></div>
        <div class="stat-card"><div class="stat-number" id="totalChapters">0</div><div class="stat-label">Total Chapters</div></div>
    </div>
    
    <div id="projectsGrid" class="project-grid"></div>
    
    <footer>
        <i class="fas fa-database"></i> Local Database (IndexedDB) | Auto-refresh on return
        <br><span style="color: var(--srui-accent);">⚡ SuperRoundedUI — Flat never felt this round.</span>
    </footer>
</div>

<div id="deletePopup" class="popup-overlay">
    <div class="popup-card">
        <i class="fas fa-trash-alt"></i>
        <h3>Delete project?</h3>
        <p id="deleteProjectTitle" style="color: var(--srui-text-secondary); margin-top: 4px;"></p>
        <div class="popup-buttons">
            <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
            <button class="btn-confirm" id="confirmDeleteBtn">Delete</button>
        </div>
    </div>
</div>
<div id="autoReloadToast" class="toast">🔄 Page reloaded</div>

<script>
    // ======================= AUTO RELOAD SYSTEM (SRUI preserved) =======================
    (function() {
        let lastActiveTime = Date.now();
        const INACTIVE_LIMIT = 5000;
        let reloadToast = document.getElementById('autoReloadToast');
        function showToast(message) {
            if (!reloadToast) return;
            reloadToast.textContent = message || '🔄 Page reloaded due to returning to tab';
            reloadToast.classList.add('show');
            setTimeout(() => reloadToast.classList.remove('show'), 3000);
        }
        function resetTimer() { lastActiveTime = Date.now(); }
        function checkAndReload() {
            if (Date.now() - lastActiveTime >= INACTIVE_LIMIT) {
                showToast('🔄 Refreshing page...');
                setTimeout(() => window.location.reload(), 100);
            } else { resetTimer(); }
        }
        document.addEventListener('visibilitychange', () => { if (!document.hidden) checkAndReload(); else lastActiveTime = Date.now(); });
        window.addEventListener('click', resetTimer);
        window.addEventListener('touchstart', resetTimer);
        window.addEventListener('scroll', resetTimer);
        resetTimer();
    })();
    
    // ======================= INDEXEDDB HELPER (SAME LOGIC, SRUI STYLED) =======================
    const DB_NAME = 'EpubSuiteDB';
    const DB_VERSION = 2;
    const PROJECTS_STORE = 'projects';
    const METADATA_STORE = 'metadata';
    const FILES_STORE = 'files';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(PROJECTS_STORE)) db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(METADATA_STORE)) db.createObjectStore(METADATA_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(FILES_STORE)) db.createObjectStore(FILES_STORE, { keyPath: 'id' });
            };
        });
    }

    async function getAllProjects() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readonly');
            const store = tx.objectStore(PROJECTS_STORE);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveProject(project) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readwrite');
            tx.objectStore(PROJECTS_STORE).put(project).onsuccess = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    async function deleteProject(projectId) {
        const db = await openDB();
        await new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readwrite');
            tx.objectStore(PROJECTS_STORE).delete(projectId).onsuccess = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
        await new Promise((resolve, reject) => {
            const tx = db.transaction(METADATA_STORE, 'readwrite');
            tx.objectStore(METADATA_STORE).delete(projectId).onsuccess = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
        await deleteProjectFiles(projectId);
    }

    async function deleteProjectFiles(projectId) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(FILES_STORE, 'readwrite');
            const store = tx.objectStore(FILES_STORE);
            const range = IDBKeyRange.bound(`${projectId}_`, `${projectId}_\uffff`);
            store.delete(range).onsuccess = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    async function getCoverUrl(projectId) {
        const db = await openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(FILES_STORE, 'readonly');
            const store = tx.objectStore(FILES_STORE);
            const request = store.get(`${projectId}_cover`);
            request.onsuccess = () => {
                if (request.result && request.result.blob) {
                    const url = URL.createObjectURL(request.result.blob);
                    resolve(url);
                } else resolve(null);
            };
            request.onerror = () => resolve(null);
        });
    }

    async function saveMetadata(metadata) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(METADATA_STORE, 'readwrite');
            tx.objectStore(METADATA_STORE).put(metadata).onsuccess = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    // Render project list with SRUI card design
    async function renderProjects() {
        const projects = await getAllProjects();
        const container = document.getElementById('projectsGrid');
        const totalSpan = document.getElementById('totalProjects');
        const chaptersSpan = document.getElementById('totalChapters');
        
        if (projects.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>No projects yet. Click "New Project" to get started.</p><span style="font-size:0.8rem; margin-top:8px; display:block;">✨ Create your first digital book</span></div>`;
            totalSpan.innerText = '0';
            chaptersSpan.innerText = '0';
            return;
        }
        
        let html = '';
        let totalChapters = 0;
        for (const proj of projects) {
            totalChapters += proj.chapterCount || 0;
            const coverUrl = await getCoverUrl(proj.id);
            const coverHtml = coverUrl ? `<img src="${coverUrl}" alt="cover" loading="lazy">` : `<div class="cover-placeholder"><i class="fas fa-book-open"></i><span style="font-size:0.7rem;">No Cover</span></div>`;
            let dateStr = proj.lastEdited ? new Date(proj.lastEdited).toLocaleDateString('en-US') : (proj.createdAt ? proj.createdAt.slice(0,10) : 'new');
            html += `<div class="project-card" data-id="${proj.id}">
                        <div class="project-cover">${coverHtml}</div>
                        <div class="menu-dots" data-id="${proj.id}"><i class="fas fa-ellipsis-v"></i></div>
                        <div class="project-info">
                            <div class="project-title">${escapeHtml(proj.title)}</div>
                            <div class="project-meta">
                                <span><i class="fas fa-layer-group"></i> ${proj.chapterCount || 0} chapters</span>
                                <span><i class="far fa-calendar-alt"></i> ${dateStr}</span>
                            </div>
                        </div>
                    </div>`;
        }
        container.innerHTML = html;
        totalSpan.innerText = projects.length;
        chaptersSpan.innerText = totalChapters;
        attachProjectEvents();
    }
    
    function attachProjectEvents() {
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.menu-dots')) return;
                openProject(card.dataset.id);
            });
        });
        document.querySelectorAll('.menu-dots').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const projects = await getAllProjects();
                const project = projects.find(p => p.id == id);
                if (project) showDeletePopup(project.id, project.title);
            });
        });
    }
    
    let pendingDeleteId = null;
    function showDeletePopup(id, title) {
        pendingDeleteId = id;
        document.getElementById('deleteProjectTitle').innerText = `"${escapeHtml(title)}"`;
        document.getElementById('deletePopup').classList.add('active');
    }
    function hideDeletePopup() { 
        document.getElementById('deletePopup').classList.remove('active'); 
        pendingDeleteId = null; 
    }
    async function confirmDelete() { 
        if (pendingDeleteId) { 
            await deleteProject(pendingDeleteId); 
            hideDeletePopup(); 
            await renderProjects(); 
        } 
    }
    
    document.getElementById('cancelDeleteBtn').addEventListener('click', hideDeletePopup);
    document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
    document.getElementById('deletePopup').addEventListener('click', (e) => { 
        if (e.target === document.getElementById('deletePopup')) hideDeletePopup(); 
    });
    
    function openProject(projectId) {
        localStorage.setItem('current_project_id', projectId);
        window.location.href = 'editor.html';
    }
    
    async function createNewProject() {
        const newId = Date.now().toString();
        const nowISO = new Date().toISOString();
        const newProject = { 
            id: newId, 
            title: 'New Project', 
            createdAt: nowISO, 
            chapterCount: 0, 
            lastEdited: nowISO 
        };
        await saveProject(newProject);
        const emptyMetadata = {
            id: newId,
            metadata: { 
                mainTitle: 'New Project', subTitle: '', volume: '', creator: 'Author', language: 'en',
                identifier: 'urn:uuid:' + crypto.randomUUID(), date: nowISO.slice(0,10), publisher: '', description: '',
                subjects: '', collectionName: '', collectionNumber: '', extraTitles: [], contributors: [] 
            },
            babItems: [], coverImagePath: null, hasCoverXhtml: false, lastUpdated: nowISO
        };
        await saveMetadata(emptyMetadata);
        localStorage.setItem('current_project_id', newId);
        window.location.href = 'editor.html';
    }
    
    function escapeHtml(str) { 
        if(!str) return ''; 
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }
    
    document.getElementById('newProjectBtn').addEventListener('click', createNewProject);
    
    // initial load
    renderProjects();
</script>
</body>
</html>
