<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>epubCreator - Edit Book</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="icon" href="../assets/icons/icon-transparent.png" type="image/png">
    <link rel="manifest" href="../assets/code/manifest.json">
    <script>
      if (typeof navigator.serviceWorker !== 'undefined') {
        navigator.serviceWorker.register('sw.js')
      }
    </script>
    <style>
        /* ========== SUPERROUNDED UI (SRUI) CORE ========== */
        :root {
            --srui-accent: #ffce00;
            --srui-background: #1B1C1E;
            --srui-card: #0f0f0f;
            --srui-text: #ffffff;
            --srui-accent-text: #000000;
            --srui-border: #4B4F50;
            --srui-text-secondary: #999999;
            --srui-text-tertiary: #666666;
            --srui-success: #4CAF50;
            --srui-error: #F44336;
            --srui-info: #2196F3;
            
            --srui-font-primary: 'Outfit', system-ui, -apple-system, sans-serif;
            --srui-radius-sm: 12px;
            --srui-radius-md: 18px;
            --srui-radius-lg: 28px;
            --srui-radius-pill: 9999px;
            
            --srui-space-1: 0.25rem;
            --srui-space-2: 0.5rem;
            --srui-space-3: 0.75rem;
            --srui-space-4: 1rem;
            --srui-space-6: 1.5rem;
            --srui-space-8: 2rem;
            
            --srui-shadow-card: 0 8px 20px rgba(0,0,0,0.5);
            --srui-shadow-raised: 0 4px 12px rgba(0,0,0,0.4);
            
            --srui-duration-fast: 0.1s;
            --srui-easing-press: cubic-bezier(0.2, 0.9, 0.4, 1.1);
            --srui-hover-scale: 0.97;
            --srui-active-scale: 0.94;
            
            --srui-z-modal: 300;
            --srui-z-toast: 400;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--srui-background);
            color: var(--srui-text);
            font-family: var(--srui-font-primary);
            line-height: 1.5;
            padding-bottom: 85px;
            min-height: 100vh;
        }
        
        /* focus ring */
        :focus-visible {
            outline: 2px solid var(--srui-accent);
            outline-offset: 2px;
            border-radius: var(--srui-radius-sm);
        }
        
        /* smooth scroll */
        html {
            scroll-behavior: smooth;
        }
        
        /* container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--srui-space-4);
        }
        
        /* app bar / header */
        .app-bar {
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: var(--srui-space-3) var(--srui-space-4);
            margin-bottom: var(--srui-space-4);
            display: flex;
            align-items: center;
            gap: var(--srui-space-3);
            backdrop-filter: blur(4px);
            box-shadow: var(--srui-shadow-card);
        }
        
        .app-bar h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--srui-accent));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        
        .back-btn {
            background-color: var(--srui-accent);
            color: var(--srui-accent-text);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--srui-radius-pill);
            transition: transform var(--srui-duration-fast) var(--srui-easing-press);
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .back-btn:active {
            transform: scale(var(--srui-active-scale));
        }
        
        /* bottom navigation (SRUI glass style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 22px;
            border-top: 1px solid var(--srui-border);
            z-index: 100;
        }
        
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--srui-text-secondary);
            font-size: 0.7rem;
            padding: 8px 16px;
            border-radius: var(--srui-radius-pill);
            cursor: pointer;
            transition: all var(--srui-duration-fast) ease;
            font-weight: 500;
        }
        
        .nav-tab i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }
        
        .nav-tab.active {
            color: var(--srui-accent);
            background: rgba(255, 206, 0, 0.12);
            transform: scale(0.98);
        }
        
        .nav-tab:active {
            transform: scale(0.94);
        }
        
        /* tab content */
        .tab-content {
            display: none;
            animation: fadeSlideIn 0.2s ease-out;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
        
        /* SRUI cards */
        .card {
            background-color: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: var(--srui-space-6);
            margin-bottom: var(--srui-space-4);
            box-shadow: var(--srui-shadow-card);
            border: 1px solid rgba(75, 79, 80, 0.3);
        }
        
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            border-left: 4px solid var(--srui-accent);
            padding-left: var(--srui-space-3);
            margin-bottom: var(--srui-space-4);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--srui-text-secondary);
            letter-spacing: 0.3px;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: #1f1f23;
            border: 1px solid var(--srui-border);
            border-radius: var(--srui-radius-md);
            color: var(--srui-text);
            font-family: var(--srui-font-primary);
            font-size: 0.95rem;
            margin-bottom: var(--srui-space-4);
            transition: all 0.1s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: var(--srui-accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 206, 0, 0.2);
        }
        
        /* buttons */
        .btn {
            background: var(--srui-accent);
            color: var(--srui-accent-text);
            border: none;
            padding: 12px 18px;
            border-radius: var(--srui-radius-pill);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: transform var(--srui-duration-fast) var(--srui-easing-press);
            width: 100%;
            font-size: 1rem;
        }
        
        .btn:active {
            transform: scale(var(--srui-active-scale));
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--srui-border);
            color: var(--srui-text);
        }
        
        .btn-sm {
            padding: 8px 16px;
            width: auto;
            font-size: 0.8rem;
            background: #ffce00;
            border: 1px solid var(--srui-border);
            border-radius: var(--srui-radius-pill);
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 500;
        }
        
        .btn-sm:active {
            transform: scale(0.96);
        }
        
        .btn-sm.danger {
            border-color: #cf6679;
            color: #ffb4a2;
            background: rgba(207, 102, 121, 0.1);
        }
        
        /* file zone */
        .file-zone {
            border: 2px dashed var(--srui-border);
            border-radius: var(--srui-radius-lg);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            background: rgba(31, 31, 35, 0.7);
            margin-bottom: var(--srui-space-4);
            transition: transform 0.1s, border-color 0.1s;
        }
        
        .file-zone:active {
            transform: scale(0.98);
            border-color: var(--srui-accent);
        }
        
        .file-zone i {
            font-size: 2.5rem;
            color: var(--srui-accent);
            margin-bottom: 8px;
        }
        
        /* bab list & items */
        .bab-list {
            background: #0a0a0c;
            border-radius: var(--srui-radius-md);
            overflow: hidden;
            margin-top: 8px;
        }
        
        .bab-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--srui-border);
            background: var(--srui-card);
            transition: background 0.1s;
        }
        
        .bab-item:active {
            background: #1c1c20;
        }
        
        .bab-title {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--srui-text);
            font-weight: 500;
            padding: 5px;
            border-radius: var(--srui-radius-sm);
        }
        
        .move-btn {
            background: #2c2c30;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: var(--srui-radius-pill);
            cursor: pointer;
            margin-left: 8px;
            transition: transform 0.05s linear;
        }
        
        .move-btn:active {
            transform: scale(0.92);
        }
        
        .info {
            background: rgba(255, 206, 0, 0.08);
            padding: var(--srui-space-4);
            border-radius: var(--srui-radius-md);
            font-size: 0.85rem;
            border-left: 3px solid var(--srui-accent);
            margin: 1rem 0;
            color: var(--srui-text-secondary);
        }
        
        .progress {
            background: #2a2a2e;
            border-radius: var(--srui-radius-pill);
            height: 8px;
            margin: 0.75rem 0;
            overflow: hidden;
        }
        
        .progress-bar {
            background: var(--srui-accent);
            width: 0%;
            height: 100%;
            border-radius: var(--srui-radius-pill);
        }
        
        .dynamic-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            background: #18181c;
            padding: 8px 12px;
            border-radius: var(--srui-radius-md);
        }
        
        .flex-buttons {
            display: flex;
            gap: 12px;
            margin: 1rem 0;
        }
        
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--srui-text-tertiary);
            margin-top: var(--srui-space-6);
        }
        
        .toast {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--srui-accent);
            color: var(--srui-accent-text);
            padding: 10px 20px;
            border-radius: var(--srui-radius-pill);
            font-size: 0.85rem;
            font-weight: 700;
            z-index: var(--srui-z-toast);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: var(--srui-shadow-raised);
        }
        
        .toast.show {
            opacity: 1;
        }
        
        @media (max-width: 560px) {
            .container { padding: 12px; }
            .card { padding: 1rem; }
            .btn-sm { font-size: 0.7rem; }
        }
        
        /* drag & drop style */
        .bab-item[draggable="true"]:active {
            opacity: 0.6;
        }
        
        .srui-pressed-effect {
            transition: transform var(--srui-duration-fast) var(--srui-easing-press);
        }
        .srui-pressed-effect:active {
            transform: scale(var(--srui-active-scale));
        }
        
        /* chip */
        .chip-accent {
            background: var(--srui-accent);
            color: #000;
            padding: 4px 12px;
            border-radius: var(--srui-radius-pill);
            font-size: 0.7rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-bar">
        <a href="index.html" style="text-decoration: none;"><div class="back-btn"><i class="fas fa-arrow-left"></i></div></a>
    </div>
    
    <div id="tabMetadata" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-pen-fancy"></i> Book Metadata</h2>
            <label>Main Title *</label><input type="text" id="mainTitle" placeholder="e.g., Adventure in Cloud Land">
            <label>Subtitle</label><input type="text" id="subTitle" placeholder="Children's fantasy story">
            <label>Volume</label><input type="text" id="volume" placeholder="Vol. 1">
            <label>Additional Titles</label><div id="extraTitlesContainer"></div><button type="button" id="addExtraTitleBtn" class="btn-sm"><i class="fas fa-plus"></i> Add Title</button>
            <label style="margin-top:12px;">Author (Creator) *</label><input type="text" id="creator" placeholder="Author name">
            <label>Contributors</label><div id="contributorsContainer"></div><button type="button" id="addContributorBtn" class="btn-sm"><i class="fas fa-user-plus"></i> Add Contributor</button>
            <label>Language</label><input type="text" id="language" value="en">
            <label>Identifier (URN)</label><input type="text" id="identifier" placeholder="urn:uuid:xxxx-xxxx">
            <label>Date</label><input type="date" id="date">
            <label>Publisher</label><input type="text" id="publisher">
            <label>Description</label><textarea id="description" rows="2" placeholder="Brief synopsis..."></textarea>
            <label>Subjects (comma separated)</label><input type="text" id="subjects" placeholder="Fiction, Adventure, Teen">
            <label>Series Name</label><input type="text" id="collectionName">
            <label>Series Number</label><input type="text" id="collectionNumber">
        </div>
    </div>
    
    <div id="tabBabMedia" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-upload"></i> Upload Project ZIP</h2>
            <div class="file-zone" id="fileZone"><i class="fas fa-folder-open"></i><div style="margin-top: 6px;">📁 Click or drop ZIP file here</div><input type="file" id="zipInput" accept=".zip" style="display: none;"></div>
            <div id="status" class="info"><i class="fas fa-info-circle"></i> No project uploaded yet.</div>
            <div class="progress" id="progressBar" style="display:none;"><div class="progress-bar"></div></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-list-ol"></i> Chapter Order (drag & drop)</h2>
            <div id="babListContainer" class="bab-list"></div>
        </div>
        <div class="card">
            <h2><i class="fas fa-images"></i> Media & Cover</h2>
            <div id="mediaSummary" class="info"></div>
            <div class="flex-buttons">
                <button id="resetProjectBtn" class="btn-outline btn-sm"><i class="fas fa-trash-alt"></i> Delete Project</button>
                <button id="downloadTemplateBtn" class="btn-outline btn-sm"><i class="fas fa-download"></i> Chapter Template</button>
            </div>
        </div>
    </div>
    
    <div id="tabGenerate" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-magic"></i> Generate EPUB</h2>
            <p style="margin-bottom: 16px; color: var(--srui-text-secondary);">Make sure ZIP is uploaded and metadata is valid.</p>
            <button id="generateBtn" class="btn"><i class="fas fa-download"></i> Generate & Download EPUB</button>
            <footer><i class="fas fa-database"></i> Media files stored in IndexedDB | SRUI Experience</footer>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-tab active" data-tab="metadata"><i class="fas fa-info-circle"></i><span>Metadata</span></button>
    <button class="nav-tab" data-tab="babmedia"><i class="fas fa-layer-group"></i><span>Chapters & Media</span></button>
    <button class="nav-tab" data-tab="generate"><i class="fas fa-cog"></i><span>Generate</span></button>
</div>
<div id="autoReloadToast" class="toast">🔄 Page reloaded</div>

<script>
    // ======================= AUTO RELOAD SYSTEM =======================
    (function() {
        let lastActiveTime = Date.now();
        const INACTIVE_LIMIT = 5000;
        let reloadToast = document.getElementById('autoReloadToast');
        function showToast(message) {
            if (!reloadToast) return;
            reloadToast.textContent = message || '🔄 Page reloaded due to returning to tab';
            reloadToast.classList.add('show');
            setTimeout(() => reloadToast.classList.remove('show'), 3000);
        }
        function resetTimer() { lastActiveTime = Date.now(); }
        function checkAndReload() {
            if (Date.now() - lastActiveTime >= INACTIVE_LIMIT) {
                showToast('🔄 Refreshing page...');
                setTimeout(() => window.location.reload(), 100);
            } else { resetTimer(); }
        }
        document.addEventListener('visibilitychange', () => { if (!document.hidden) checkAndReload(); else lastActiveTime = Date.now(); });
        window.addEventListener('click', resetTimer);
        window.addEventListener('touchstart', resetTimer);
        window.addEventListener('scroll', resetTimer);
        resetTimer();
    })();
    
    // ======================= INDEXEDDB HELPERS =======================
    const DB_NAME = 'EpubSuiteDB';
    const DB_VERSION = 2;
    const PROJECTS_STORE = 'projects';
    const METADATA_STORE = 'metadata';
    const FILES_STORE = 'files';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(PROJECTS_STORE)) db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(METADATA_STORE)) db.createObjectStore(METADATA_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(FILES_STORE)) db.createObjectStore(FILES_STORE, { keyPath: 'id' });
            };
        });
    }
    async function saveProject(project) { const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(PROJECTS_STORE,'readwrite'); tx.objectStore(PROJECTS_STORE).put(project).onsuccess=()=>res(); tx.onerror=()=>rej(tx.error); }); }
    async function getMetadata(projectId) { const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(METADATA_STORE,'readonly'); const req=tx.objectStore(METADATA_STORE).get(projectId); req.onsuccess=()=>res(req.result||null); req.onerror=()=>rej(req.error); }); }
    async function saveMetadata(metadata) { const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(METADATA_STORE,'readwrite'); tx.objectStore(METADATA_STORE).put(metadata).onsuccess=()=>res(); tx.onerror=()=>rej(tx.error); }); }
    async function saveFile(projectId, filePath, blob) { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(FILES_STORE,'readwrite'); tx.objectStore(FILES_STORE).put({ id:`${projectId}_${filePath}`, blob, path: filePath, projectId }).onsuccess=()=>res(); tx.onerror=()=>rej(tx.error); }); }
    async function deleteAllProjectFiles(projectId) { const db=await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(FILES_STORE,'readwrite'); tx.objectStore(FILES_STORE).delete(IDBKeyRange.bound(`${projectId}_`, `${projectId}_\uffff`)).onsuccess=()=>res(); tx.onerror=()=>rej(tx.error); }); }
    async function deleteProject(projectId) { const db=await openDB(); await new Promise((res,rej)=>{ const tx=db.transaction(PROJECTS_STORE,'readwrite'); tx.objectStore(PROJECTS_STORE).delete(projectId).onsuccess=()=>res(); tx.onerror=()=>rej(tx.error); }); await new Promise((res,rej)=>{ const tx=db.transaction(METADATA_STORE,'readwrite'); tx.objectStore(METADATA_STORE).delete(projectId).onsuccess=()=>res(); }); await deleteAllProjectFiles(projectId); }
    
    // ======================= STATE =======================
    let projectId = localStorage.getItem('current_project_id') || Date.now().toString();
    let originalZipBlob = null;
    let babItems = [];
    let mediaItems = { images: [], audio: [] };
    let coverImagePath = null;
    let hasCoverXhtml = false;
    let extraTitles = [];
    let contributors = [];

    const statusDiv = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const babContainer = document.getElementById('babListContainer');
    const mediaSummary = document.getElementById('mediaSummary');
    const fileZone = document.getElementById('fileZone');
    const zipInput = document.getElementById('zipInput');

    async function saveCurrentProject() {
        const metadataObj = {
            id: projectId,
            metadata: {
                mainTitle: document.getElementById('mainTitle').value,
                subTitle: document.getElementById('subTitle').value,
                volume: document.getElementById('volume').value,
                creator: document.getElementById('creator').value,
                language: document.getElementById('language').value,
                identifier: document.getElementById('identifier').value,
                date: document.getElementById('date').value,
                publisher: document.getElementById('publisher').value,
                description: document.getElementById('description').value,
                subjects: document.getElementById('subjects').value,
                collectionName: document.getElementById('collectionName').value,
                collectionNumber: document.getElementById('collectionNumber').value,
                extraTitles: extraTitles,
                contributors: contributors
            },
            babItems: babItems,
            coverImagePath: coverImagePath,
            hasCoverXhtml: hasCoverXhtml,
            lastUpdated: new Date().toISOString()
        };
        await saveMetadata(metadataObj);
        await saveProject({ id: projectId, title: document.getElementById('mainTitle').value || 'Untitled Project', chapterCount: babItems.length, lastEdited: new Date().toISOString() });
    }
    
    async function loadProject() {
        const metadata = await getMetadata(projectId);
        if (!metadata) {
            document.getElementById('mainTitle').value = 'New EPUB Book';
            document.getElementById('creator').value = 'Author';
            document.getElementById('identifier').value = 'urn:uuid:' + crypto.randomUUID();
            document.getElementById('date').value = new Date().toISOString().slice(0,10);
            await saveCurrentProject();
            return;
        }
        document.getElementById('mainTitle').value = metadata.metadata.mainTitle || '';
        document.getElementById('subTitle').value = metadata.metadata.subTitle || '';
        document.getElementById('volume').value = metadata.metadata.volume || '';
        document.getElementById('creator').value = metadata.metadata.creator || '';
        document.getElementById('language').value = metadata.metadata.language || 'en';
        document.getElementById('identifier').value = metadata.metadata.identifier || '';
        document.getElementById('date').value = metadata.metadata.date || '';
        document.getElementById('publisher').value = metadata.metadata.publisher || '';
        document.getElementById('description').value = metadata.metadata.description || '';
        document.getElementById('subjects').value = metadata.metadata.subjects || '';
        document.getElementById('collectionName').value = metadata.metadata.collectionName || '';
        document.getElementById('collectionNumber').value = metadata.metadata.collectionNumber || '';
        extraTitles = metadata.metadata.extraTitles || [];
        contributors = metadata.metadata.contributors || [];
        babItems = metadata.babItems || [];
        coverImagePath = metadata.coverImagePath;
        hasCoverXhtml = metadata.hasCoverXhtml;
        renderExtraTitles(); renderContributors(); renderBabList(); renderMediaSummary();
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Project loaded. Upload ZIP for content.';
    }
    
    function renderExtraTitles() {
        const container = document.getElementById('extraTitlesContainer');
        container.innerHTML = extraTitles.map((title, idx) => `<div class="dynamic-item"><input type="text" value="${escapeHtml(title)}" data-idx="${idx}" class="extra-title-input" style="flex:1; background:#111114;"><button class="btn-sm danger remove-extra-title" data-idx="${idx}"><i class="fas fa-times"></i></button></div>`).join('');
        document.querySelectorAll('.extra-title-input').forEach(inp => inp.addEventListener('change', (e) => { const idx = parseInt(inp.dataset.idx); extraTitles[idx] = inp.value; saveCurrentProject(); }));
        document.querySelectorAll('.remove-extra-title').forEach(btn => btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.idx); extraTitles.splice(idx,1); renderExtraTitles(); saveCurrentProject(); }));
    }
    function renderContributors() {
        const container = document.getElementById('contributorsContainer');
        container.innerHTML = contributors.map((c, idx) => `<div class="dynamic-item"><input type="text" placeholder="Name" value="${escapeHtml(c.name)}" data-idx="${idx}" class="contrib-name" style="flex:2;"><input type="text" placeholder="Role" value="${escapeHtml(c.role)}" data-idx="${idx}" class="contrib-role" style="flex:1;"><button class="btn-sm danger remove-contrib" data-idx="${idx}"><i class="fas fa-user-minus"></i></button></div>`).join('');
        document.querySelectorAll('.contrib-name').forEach(inp => inp.addEventListener('change', (e) => { const idx = parseInt(inp.dataset.idx); contributors[idx].name = inp.value; saveCurrentProject(); }));
        document.querySelectorAll('.contrib-role').forEach(inp => inp.addEventListener('change', (e) => { const idx = parseInt(inp.dataset.idx); contributors[idx].role = inp.value; saveCurrentProject(); }));
        document.querySelectorAll('.remove-contrib').forEach(btn => btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.idx); contributors.splice(idx,1); renderContributors(); saveCurrentProject(); }));
    }
    function renderBabList() {
        if (!babItems.length) { babContainer.innerHTML = '<div style="padding:1rem; text-align:center; color:#888;">No chapters yet. Upload ZIP.</div>'; return; }
        let html = '';
        babItems.forEach((bab, idx) => { html += `<div class="bab-item" draggable="true" data-index="${idx}"><div style="display:flex; align-items:center; gap:8px; flex:1;"><i class="fas fa-grip-vertical" style="cursor:grab; color:#aaa;"></i><input type="text" class="bab-title" value="${escapeHtml(bab.title)}" data-idx="${idx}" style="background:none; border:none;"></div><div><button class="move-btn move-up" data-idx="${idx}"><i class="fas fa-chevron-up"></i></button><button class="move-btn move-down" data-idx="${idx}"><i class="fas fa-chevron-down"></i></button></div></div>`; });
        babContainer.innerHTML = html;
        document.querySelectorAll('.bab-title').forEach(inp => inp.addEventListener('change', (e) => { const idx = parseInt(inp.dataset.idx); babItems[idx].title = inp.value; saveCurrentProject(); }));
        attachDragAndDrop(); attachMoveButtons();
    }
    function attachDragAndDrop() { const items = document.querySelectorAll('.bab-item'); items.forEach(item => { item.addEventListener('dragstart', handleDragStart); item.addEventListener('dragover', e => e.preventDefault()); item.addEventListener('drop', handleDrop); }); }
    let dragSrcIndex = null;
    function handleDragStart(e) { const el = e.target.closest('.bab-item'); if(el) { dragSrcIndex = parseInt(el.dataset.index); e.dataTransfer.effectAllowed = 'move'; } }
    function handleDrop(e) { e.preventDefault(); const targetEl = e.target.closest('.bab-item'); if(targetEl && dragSrcIndex !== null) { const targetIndex = parseInt(targetEl.dataset.index); if(dragSrcIndex !== targetIndex) { const [moved] = babItems.splice(dragSrcIndex,1); babItems.splice(targetIndex,0,moved); renderBabList(); saveCurrentProject(); } dragSrcIndex = null; } }
    function attachMoveButtons() { document.querySelectorAll('.move-up').forEach(btn => btn.addEventListener('click', () => { const idx = parseInt(btn.dataset.idx); if(idx>0) { [babItems[idx-1], babItems[idx]] = [babItems[idx], babItems[idx-1]]; renderBabList(); saveCurrentProject(); } })); document.querySelectorAll('.move-down').forEach(btn => btn.addEventListener('click', () => { const idx = parseInt(btn.dataset.idx); if(idx<babItems.length-1) { [babItems[idx+1], babItems[idx]] = [babItems[idx], babItems[idx+1]]; renderBabList(); saveCurrentProject(); } })); }
    function renderMediaSummary() { mediaSummary.innerHTML = `<i class="fas fa-image"></i> ${mediaItems.images.length} Images &nbsp;| <i class="fas fa-headphones"></i> ${mediaItems.audio.length} Audio &nbsp;| <span class="chip-accent" style="display:inline-block;">Cover: ${coverImagePath ? '✅ Yes' : '❌ No'}</span>`; }
    
    fileZone.addEventListener('click', () => zipInput.click());
    zipInput.addEventListener('change', handleZipUpload);
    
    async function handleZipUpload(e) {
        const file = e.target.files[0];
        if (!file || !file.name.endsWith('.zip')) { statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a valid ZIP file.'; return; }
        statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Reading ZIP...';
        progressBar.style.display = 'block';
        document.querySelector('.progress-bar').style.width = '20%';
        try {
            const zip = await JSZip.loadAsync(file);
            originalZipBlob = file;
            await deleteAllProjectFiles(projectId);
            const newBabItems = []; const newMedia = { images: [], audio: [] }; let newCoverPath = null; let newHasCoverXhtml = false;
            const allFiles = Object.keys(zip.files);
            let processed = 0;
            for (const relPath of allFiles) {
                if (zip.files[relPath].dir) continue;
                const zipFile = zip.files[relPath];
                const name = relPath.split('/').pop();
                if (/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(name)) {
                    if (relPath.toLowerCase().includes('cover') || name.match(/^cover\./i)) newCoverPath = relPath;
                    newMedia.images.push({ path: relPath, name });
                    const blob = await zipFile.async('blob');
                    await saveFile(projectId, relPath, blob);
                } else if (/\.(mp3|m4a|ogg|wav)$/i.test(name)) {
                    newMedia.audio.push({ path: relPath, name });
                    const blob = await zipFile.async('blob');
                    await saveFile(projectId, relPath, blob);
                } else if (/\.(xhtml|html|xml)$/i.test(name)) {
                    if (name === 'cover.xhtml' || name === 'cover.html') newHasCoverXhtml = true;
                    else {
                        let content = await zipFile.async('string');
                        let title = name.replace(/\.xhtml$/i, '').replace(/\.html$/i, '');
                        const match = content.match(/<title[^>]*>([^<]*)<\/title>/i);
                        if (match && match[1]) title = match[1].trim();
                        newBabItems.push({ path: relPath, name, title });
                    }
                }
                processed++; document.querySelector('.progress-bar').style.width = `${20 + (processed/allFiles.length)*60}%`;
            }
            babItems = newBabItems.sort((a,b)=>a.name.localeCompare(b.name));
            mediaItems = newMedia; coverImagePath = newCoverPath; hasCoverXhtml = newHasCoverXhtml;
            renderBabList(); renderMediaSummary();
            statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> ZIP ready: ${babItems.length} chapters, ${mediaItems.images.length} images, ${mediaItems.audio.length} audio.`;
            await saveCurrentProject();
            progressBar.style.display = 'none';
        } catch(err) { statusDiv.innerHTML = '<i class="fas fa-times-circle"></i> Failed to read ZIP.'; progressBar.style.display = 'none'; }
    }
    
    document.getElementById('generateBtn').addEventListener('click', async () => {
        if (!originalZipBlob) { statusDiv.innerHTML = '<i class="fas fa-ban"></i> Upload ZIP first.'; return; }
        const mainTitle = document.getElementById('mainTitle').value.trim();
        const creator = document.getElementById('creator').value.trim();
        if (!mainTitle || !creator) { alert("Title and Author are required."); return; }
        statusDiv.innerHTML = '<i class="fas fa-cog fa-spin"></i> Building EPUB...';
        const newZip = new JSZip();
        const zip = await JSZip.loadAsync(originalZipBlob);
        const skipPaths = ['content.opf', 'META-INF/container.xml', 'toc.xhtml', 'nav.xhtml', 'cover.xhtml', 'mimetype'];
        for (const relPath of Object.keys(zip.files)) {
            if (zip.files[relPath].dir || skipPaths.includes(relPath) || relPath.startsWith('META-INF/')) continue;
            const blob = await zip.files[relPath].async('blob');
            newZip.file(relPath.startsWith('EPUB/') ? relPath : 'EPUB/' + relPath, blob);
        }
        newZip.file("mimetype", "application/epub+zip", { compression: "STORE" });
        newZip.file("META-INF/container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="EPUB/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);
        let coverImgRel = coverImagePath ? coverImagePath : "images/cover.png";
        if (coverImgRel.startsWith('EPUB/')) coverImgRel = coverImgRel.substring(5);
        let manifest = [], spine = [];
        manifest.push(`<item id="cover-image" href="${escapeXml(coverImgRel)}" media-type="${coverImgRel.endsWith('.png')?'image/png':'image/jpeg'}" properties="cover-image"/>`);
        const coverXhtmlPath = "cover.xhtml";
        if (!hasCoverXhtml) newZip.file("EPUB/" + coverXhtmlPath, `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${escapeXml(mainTitle)}</title></head><body><svg width="100%" height="100%"><image width="100%" height="100%" href="${escapeXml(coverImgRel)}"/></svg></body></html>`);
        else { const coverFile = zip.files[coverXhtmlPath]; if(coverFile) newZip.file("EPUB/"+coverXhtmlPath, await coverFile.async('blob')); }
        manifest.push(`<item id="cover-xhtml" href="${coverXhtmlPath}" media-type="application/xhtml+xml"/>`);
        spine.push(`<itemref idref="cover-xhtml" linear="yes"/>`);
        const navPoints = babItems.map(bab => `<li><a href="${escapeXml(bab.path.startsWith('EPUB/')?bab.path.substring(5):bab.path)}">${escapeXml(bab.title)}</a></li>`).join("\n");
        newZip.file("EPUB/toc.xhtml", `<?xml version="1.0"?><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Table of Contents</title></head><body><nav epub:type="toc"><h1>Table of Contents</h1><ol>${navPoints}</ol></nav></body></html>`);
        manifest.push(`<item id="toc" href="toc.xhtml" media-type="application/xhtml+xml" properties="nav"/>`);
        spine.push(`<itemref idref="toc" linear="no"/>`);
        babItems.forEach((bab, idx) => { const id = `chap_${idx+1}`; let href = bab.path.startsWith('EPUB/') ? bab.path.substring(5) : bab.path; manifest.push(`<item id="${id}" href="${href}" media-type="application/xhtml+xml"/>`); spine.push(`<itemref idref="${id}" linear="yes"/>`); });
        [...mediaItems.images, ...mediaItems.audio].forEach(med => { const id = `media_${med.name.replace(/[^a-zA-Z0-9]/g, '_')}`; let href = med.path.startsWith('EPUB/') ? med.path.substring(5) : med.path; const ext = med.name.split('.').pop().toLowerCase(); let mime = ext==='png'?'image/png':ext==='jpg'||ext==='jpeg'?'image/jpeg':ext==='webp'?'image/webp':ext==='mp3'?'audio/mpeg':'application/octet-stream'; manifest.push(`<item id="${id}" href="${href}" media-type="${mime}"/>`); });
        let titles = [mainTitle]; if (document.getElementById('subTitle').value.trim()) titles.push(document.getElementById('subTitle').value.trim()); if (document.getElementById('volume').value.trim()) titles.push(document.getElementById('volume').value.trim()); extraTitles.forEach(t => { if(t.trim()) titles.push(t.trim()); });
        let allContributors = [{ name: creator, role: "aut" }]; contributors.forEach(c => { if(c.name.trim()) allContributors.push({ name: c.name.trim(), role: c.role.trim() || "ctb" }); });
        let metadata = titles.map(t => `<dc:title>${escapeXml(t)}</dc:title>`);
        allContributors.forEach(c => { if(c.role==='aut') metadata.push(`<dc:creator id="creator">${escapeXml(c.name)}</dc:creator>`); else metadata.push(`<dc:contributor>${escapeXml(c.name)}</dc:contributor>`); });
        const subjects = document.getElementById('subjects').value.split(',').map(s=>s.trim()).filter(s=>s); subjects.forEach(s => metadata.push(`<dc:subject>${escapeXml(s)}</dc:subject>`));
        if(document.getElementById('description').value.trim()) metadata.push(`<dc:description>${escapeXml(document.getElementById('description').value)}</dc:description>`);
        if(document.getElementById('publisher').value.trim()) metadata.push(`<dc:publisher>${escapeXml(document.getElementById('publisher').value)}</dc:publisher>`);
        metadata.push(`<dc:language>${escapeXml(document.getElementById('language').value)}</dc:language>`);
        let identifier = document.getElementById('identifier').value.trim(); if(!identifier) identifier = "urn:uuid:" + crypto.randomUUID();
        metadata.push(`<dc:identifier id="pub-id">${escapeXml(identifier)}</dc:identifier><dc:date>${escapeXml(document.getElementById('date').value || new Date().toISOString().slice(0,10))}</dc:date>`);
        const collectionName = document.getElementById('collectionName').value.trim(); const collectionNumber = document.getElementById('collectionNumber').value.trim();
        if(collectionName) { metadata.push(`<meta property="belongs-to-collection" id="collection">${escapeXml(collectionName)}</meta>`); if(collectionNumber) metadata.push(`<meta property="group-position" refines="#collection">${escapeXml(collectionNumber)}</meta>`); }
        metadata.push(`<meta property="dcterms:modified">${new Date().toISOString()}</meta><meta property="rendition:layout">reflowable</meta>`);
        const opf = `<?xml version="1.0" encoding="UTF-8"?><package xmlns="http://www.idpf.org/2007/opf" version="3.0" unique-identifier="pub-id" xml:lang="${escapeXml(document.getElementById('language').value)}"><metadata xmlns:dc="http://purl.org/dc/elements/1.1/">${metadata.join("\n    ")}</metadata><manifest>${manifest.join("\n    ")}</manifest><spine page-progression-direction="ltr">${spine.join("\n    ")}</spine></package>`;
        newZip.file("EPUB/content.opf", opf);
        const zipBlob = await newZip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
        const url = URL.createObjectURL(zipBlob); const a = document.createElement('a'); a.href = url; a.download = `${mainTitle.replace(/[^a-z0-9]/gi, '_')}_epub.zip`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Success! EPUB ZIP file ready.';
        await saveCurrentProject();
    });
    
    document.getElementById('resetProjectBtn').addEventListener('click', async () => { if(confirm('Delete all data of this project?')) { await deleteProject(projectId); projectId = Date.now().toString(); localStorage.setItem('current_project_id', projectId); location.reload(); } });
    document.getElementById('downloadTemplateBtn').addEventListener('click', () => { const template = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd"><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en"><head><title>Chapter Title</title><meta name="viewport" content="width=device-width"/></head><body><h1>Chapter Title</h1><p>Write content here.</p></body></html>`; const blob = new Blob([template], {type:"application/xhtml+xml"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "template-chapter.xhtml"; a.click(); URL.revokeObjectURL(a.href); });
    const autoSaveFields = ['mainTitle','subTitle','volume','creator','language','identifier','date','publisher','description','subjects','collectionName','collectionNumber'];
    autoSaveFields.forEach(id => { document.getElementById(id)?.addEventListener('input', () => saveCurrentProject()); });
    document.getElementById('addExtraTitleBtn')?.addEventListener('click', () => { extraTitles.push(''); renderExtraTitles(); saveCurrentProject(); });
    document.getElementById('addContributorBtn')?.addEventListener('click', () => { contributors.push({ name: '', role: '' }); renderContributors(); saveCurrentProject(); });
    
    const tabs = document.querySelectorAll('.nav-tab'); const contents = { metadata: document.getElementById('tabMetadata'), babmedia: document.getElementById('tabBabMedia'), generate: document.getElementById('tabGenerate') };
    tabs.forEach(tab => { tab.addEventListener('click', () => { const target = tab.dataset.tab; tabs.forEach(t => t.classList.remove('active')); tab.classList.add('active'); Object.values(contents).forEach(c => c.classList.remove('active')); if(target==='metadata') contents.metadata.classList.add('active'); else if(target==='babmedia') contents.babmedia.classList.add('active'); else if(target==='generate') contents.generate.classList.add('active'); }); });
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function escapeXml(str) { return escapeHtml(str); }
    loadProject();
</script>
</body>
</html>
