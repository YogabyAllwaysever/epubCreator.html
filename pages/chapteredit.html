<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>epubCreator - Edit Chapter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --srui-accent: #ffce00;
            --srui-background: #1B1C1E;
            --srui-card: #0f0f0f;
            --srui-text: #ffffff;
            --srui-accent-text: #000000;
            --srui-border: #4B4F50;
            --srui-text-secondary: #999999;
            --srui-text-tertiary: #666666;
            --srui-radius-sm: 12px;
            --srui-radius-md: 18px;
            --srui-radius-lg: 28px;
            --srui-radius-pill: 9999px;
            --srui-shadow-card: 0 8px 20px rgba(0,0,0,0.5);
            --srui-active-scale: 0.94;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: var(--srui-background);
            color: var(--srui-text);
            font-family: 'Outfit', sans-serif;
            padding-bottom: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
        }
        .app-bar {
            background: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: 12px 20px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--srui-shadow-card);
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .back-btn, .save-manual-btn {
            background-color: var(--srui-accent);
            color: var(--srui-accent-text);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--srui-radius-pill);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .save-manual-btn {
            background-color: transparent;
            border: 1px solid var(--srui-accent);
            color: var(--srui-accent);
        }
        .back-btn:active, .save-manual-btn:active {
            transform: scale(var(--srui-active-scale));
        }
        .title-input {
            flex: 1;
            background: #1f1f23;
            border: 1px solid var(--srui-border);
            border-radius: var(--srui-radius-md);
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
        }
        .card {
            background-color: var(--srui-card);
            border-radius: var(--srui-radius-lg);
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--srui-shadow-card);
        }
        .ql-toolbar.ql-snow {
            position: sticky;
            top: 80px;
            z-index: 150;
            background: #2a2a2e;
            border-radius: var(--srui-radius-md) var(--srui-radius-md) 0 0;
            border-color: var(--srui-border);
        }
        #editor-container {
            height: 65vh;
            background: #1f1f23;
            border-radius: 0 0 var(--srui-radius-md) var(--srui-radius-md);
            overflow: auto;
        }
        .ql-container {
            font-family: 'Outfit', monospace;
            font-size: 1rem;
        }
        .ql-editor {
            color: var(--srui-text);
        }
        .info {
            background: rgba(255, 206, 0, 0.08);
            padding: 0.75rem;
            border-radius: var(--srui-radius-md);
            font-size: 0.85rem;
            border-left: 3px solid var(--srui-accent);
            margin-top: 1rem;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--srui-accent);
            color: black;
            padding: 8px 20px;
            border-radius: var(--srui-radius-pill);
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--srui-text-tertiary);
            margin-top: 2rem;
        }
        @media (max-width: 600px) {
            .container { padding: 0.75rem; }
            #editor-container { height: 55vh; }
            .ql-toolbar.ql-snow { top: 70px; }
        }
        .custom-undo-redo {
            display: inline-flex;
            gap: 8px;
            margin-left: 10px;
        }
        .custom-undo-redo button {
            background: #3a3a40;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: var(--srui-radius-pill);
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-bar">
        <div class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></div>
        <input type="text" id="chapterTitle" class="title-input" placeholder="Chapter Title">
        <div class="save-manual-btn" id="saveBtn"><i class="fas fa-save"></i></div>
    </div>

    <div class="card">
        <div id="editor-container"></div>
        <div id="status" class="info"><i class="fas fa-info-circle"></i> Ready. Write your chapter.</div>
    </div>
    <footer>⚠️ Only basic HTML tags (p, strong, em, h2, h3, ul, ol, li, a, img) are allowed.</footer>
</div>
<div id="toastMsg" class="toast">Saved!</div>

<script>
    // ======================= INDEXEDDB HELPERS =======================
    const DB_NAME = 'EpubSuiteDB';
    const DB_VERSION = 2;
    const PROJECTS_STORE = 'projects';
    const METADATA_STORE = 'metadata';
    const FILES_STORE = 'files';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(PROJECTS_STORE)) db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(METADATA_STORE)) db.createObjectStore(METADATA_STORE, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(FILES_STORE)) db.createObjectStore(FILES_STORE, { keyPath: 'id' });
            };
        });
    }

    async function getMetadata(projectId) {
        const db = await openDB();
        return new Promise((res, rej) => {
            const tx = db.transaction(METADATA_STORE, 'readonly');
            const req = tx.objectStore(METADATA_STORE).get(projectId);
            req.onsuccess = () => res(req.result || null);
            req.onerror = () => rej(req.error);
        });
    }

    async function saveMetadata(metadata) {
        const db = await openDB();
        return new Promise((res, rej) => {
            const tx = db.transaction(METADATA_STORE, 'readwrite');
            tx.objectStore(METADATA_STORE).put(metadata).onsuccess = () => res();
            tx.onerror = () => rej(tx.error);
        });
    }

    async function saveFile(projectId, filePath, blob) {
        const db = await openDB();
        return new Promise((res, rej) => {
            const tx = db.transaction(FILES_STORE, 'readwrite');
            tx.objectStore(FILES_STORE).put({ id: `${projectId}_${filePath}`, blob, path: filePath, projectId }).onsuccess = () => res();
            tx.onerror = () => rej(tx.error);
        });
    }

    async function getFile(projectId, filePath) {
        const db = await openDB();
        return new Promise((res, rej) => {
            const tx = db.transaction(FILES_STORE, 'readonly');
            const req = tx.objectStore(FILES_STORE).get(`${projectId}_${filePath}`);
            req.onsuccess = () => res(req.result ? req.result.blob : null);
            req.onerror = () => rej(req.error);
        });
    }

    // ======================= PARSE URL PARAMS =======================
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('projectId');
    const mode = urlParams.get('mode');
    const filePath = urlParams.get('path');

    if (!projectId) {
        alert('Project ID missing. Redirecting...');
        window.location.href = 'editor.html';
    }

    let currentBabPath = null;
    let quill = null;

    // ======================= INIT QUILL WITH UNDO/REDO =======================
    const toolbarOptions = [
        ['bold', 'italic', 'underline'],
        [{ 'header': [2, 3, false] }],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link', 'image'],
        ['clean']
    ];

    quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: toolbarOptions
            },
            history: {
                delay: 1000,
                maxStack: 100,
                userOnly: true
            }
        },
        placeholder: 'Write your chapter content here...'
    });

    // Tambahkan tombol Undo/Redo ke toolbar (dengan pengecekan keamanan)
    const toolbar = quill.getModule('toolbar');
    if (toolbar && toolbar.container) {
        const undoRedoGroup = document.createElement('span');
        undoRedoGroup.className = 'custom-undo-redo';
        undoRedoGroup.innerHTML = '<button id="quill-undo"><i class="fas fa-undo"></i> Undo</button><button id="quill-redo"><i class="fas fa-redo"></i> Redo</button>';
        toolbar.container.appendChild(undoRedoGroup);
        document.getElementById('quill-undo')?.addEventListener('click', () => quill.history.undo());
        document.getElementById('quill-redo')?.addEventListener('click', () => quill.history.redo());
    }

    function sanitizeXHTML(html) {
        return DOMPurify.sanitize(html, {
            ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'u', 'h2', 'h3', 'ul', 'ol', 'li', 'a', 'img', 'div', 'span'],
            ALLOWED_ATTR: ['href', 'src', 'alt', 'title', 'width', 'height'],
            FORBID_ATTR: ['class', 'style', 'id'],
            FORBID_TAGS: ['script', 'style', 'iframe']
        });
    }

    function buildXHTML(title, bodyHTML) {
        const cleanBody = sanitizeXHTML(bodyHTML);
        return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <title>${escapeXml(title)}<\/title>
<\/head>
<body>
    ${cleanBody}
<\/body>
<\/html>`;
    }

    function escapeXml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function statusMessage(msg, type = 'info') {
        const statusDiv = document.getElementById('status');
        if (!statusDiv) return;
        const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle');
        statusDiv.innerHTML = `<i class="fas ${icon}"><\/i> ${msg}`;
        if (type === 'success') showToast(msg);
    }

    async function loadChapterForEdit() {
        if (mode !== 'edit' || !filePath) {
            document.getElementById('chapterTitle').value = '';
            quill.setContents([]);
            statusMessage('New chapter mode. Enter title and content.', 'info');
            return;
        }
        statusMessage('Loading chapter...', 'info');
        try {
            const blob = await getFile(projectId, filePath);
            if (!blob) throw new Error('File not found');
            const htmlString = await blob.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/xml');
            const titleElem = doc.querySelector('title');
            const title = titleElem ? titleElem.textContent : 'Untitled';
            const bodyElem = doc.querySelector('body');
            let bodyHTML = '';
            if (bodyElem) {
                bodyHTML = Array.from(bodyElem.childNodes).map(node => {
                    if (node.nodeType === Node.ELEMENT_NODE) return node.outerHTML;
                    if (node.nodeType === Node.TEXT_NODE) return node.textContent;
                    return '';
                }).join('');
            }
            document.getElementById('chapterTitle').value = title;
            quill.clipboard.dangerouslyPasteHTML(bodyHTML);
            currentBabPath = filePath;
            statusMessage('Chapter loaded. You can edit.', 'success');
        } catch (err) {
            console.error(err);
            statusMessage('Error loading chapter. Starting fresh.', 'error');
        }
    }

    async function saveChapter() {
        const titleInput = document.getElementById('chapterTitle').value.trim();
        if (!titleInput) {
            alert('Please enter a chapter title.');
            return;
        }
        const htmlContent = quill.root.innerHTML;
        const fullXHTML = buildXHTML(titleInput, htmlContent);
        const blob = new Blob([fullXHTML], { type: 'application/xhtml+xml' });

        let targetPath = currentBabPath;
        let isNew = false;
        if (mode === 'new' || !targetPath) {
            const timestamp = Date.now();
            const slug = titleInput.replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 30);
            targetPath = `EPUB/chapters/${timestamp}_${slug}.xhtml`;
            isNew = true;
        }

        await saveFile(projectId, targetPath, blob);
        statusMessage('Chapter saved!', 'success');

        const metadata = await getMetadata(projectId);
        if (!metadata) {
            alert('Project metadata not found!');
            return;
        }
        let babItems = metadata.babItems || [];
        if (isNew) {
            babItems.push({
                path: targetPath,
                title: titleInput,
                name: targetPath.split('/').pop()
            });
        } else {
            const idx = babItems.findIndex(b => b.path === targetPath);
            if (idx !== -1) {
                babItems[idx].title = titleInput;
            } else {
                babItems.push({
                    path: targetPath,
                    title: titleInput,
                    name: targetPath.split('/').pop()
                });
            }
        }
        metadata.babItems = babItems;
        await saveMetadata(metadata);

        setTimeout(() => {
            window.location.href = `editor.html?refresh=true&projectId=${projectId}`;
        }, 800);
    }

    // Auto-save draft every 30 seconds
    function autoSaveDraft() {
        const title = document.getElementById('chapterTitle').value;
        const content = quill.root.innerHTML;
        localStorage.setItem(`draft_${projectId}`, JSON.stringify({ title, content, mode, path: currentBabPath }));
    }
    setInterval(autoSaveDraft, 30000);

    (function restoreDraft() {
        const draft = localStorage.getItem(`draft_${projectId}`);
        if (draft && mode === 'new') {
            try {
                const { title, content } = JSON.parse(draft);
                if (title && content && confirm('Draft found. Restore?')) {
                    document.getElementById('chapterTitle').value = title;
                    quill.clipboard.dangerouslyPasteHTML(content);
                }
                localStorage.removeItem(`draft_${projectId}`);
            } catch(e) {}
        }
    })();

    document.getElementById('saveBtn').addEventListener('click', saveChapter);
    document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = `editor.html?projectId=${projectId}`;
    });

    loadChapterForEdit();
</script>
</body>
</html>
