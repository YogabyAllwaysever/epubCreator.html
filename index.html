<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>EPUB Suite - Proyek Saya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #121212; font-family: 'Outfit', system-ui, sans-serif; color: #fff; padding: 1rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #fff, #ffce00); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .btn-new { background: #ffce00; color: #1e1e1e; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.1s; }
        .btn-new:active { transform: scale(0.96); }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #1e1e1e; border-radius: 24px; padding: 16px; flex: 1; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .stat-number { font-size: 2rem; font-weight: 700; color: #ffce00; }
        .stat-label { font-size: 0.8rem; color: #aaa; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 8px; }
        .project-card { background: #1e1e1e; border-radius: 24px; overflow: hidden; transition: transform 0.1s; cursor: pointer; position: relative; border: 1px solid #2c2c2e; }
        .project-card:active { transform: scale(0.98); }
        .project-cover { aspect-ratio: 2 / 2.5; background: #2a2a2c; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .project-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cover-placeholder { font-size: 3rem; color: #ffce00; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .project-info { padding: 12px 12px 16px; }
        .project-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .project-meta { font-size: 0.7rem; color: #aaa; display: flex; justify-content: space-between; margin-top: 6px; }
        .menu-dots { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); width: 36px; height: 36px; border-radius: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; }
        .menu-dots:active { background: rgba(0,0,0,0.9); transform: scale(0.94); }
        .menu-dots i { color: white; font-size: 1.2rem; }
        .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; visibility: hidden; opacity: 0; transition: 0.1s; }
        .popup-overlay.active { visibility: visible; opacity: 1; }
        .popup-card { background: #1e1e1e; border-radius: 32px; padding: 24px; width: 280px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .popup-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .popup-buttons button { flex: 1; padding: 10px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .btn-confirm { background: #cf6679; color: white; }
        .btn-cancel { background: #2c2c2e; color: white; }
        .empty-state { text-align: center; padding: 60px 20px; background: #1e1e1e; border-radius: 32px; color: #aaa; }
        footer { text-align: center; font-size: 0.7rem; color: #666; margin-top: 2rem; }
        @media (max-width: 560px) { .project-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; } .project-title { font-size: 0.85rem; } .stats { gap: 12px; } .stat-card { padding: 12px; } .stat-number { font-size: 1.5rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-book"></i> EPUB Suite</h1>
        <button class="btn-new" id="newProjectBtn"><i class="fas fa-plus"></i> Proyek Baru</button>
    </div>
    <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalProjects">0</div><div class="stat-label">Total Proyek</div></div>
        <div class="stat-card"><div class="stat-number" id="totalChapters">0</div><div class="stat-label">Total Bab</div></div>
    </div>
    <div id="projectsGrid" class="project-grid"></div>
    <footer><i class="fas fa-database"></i> Database terenkripsi lokal (IndexedDB)</footer>
</div>
<div id="deletePopup" class="popup-overlay">
    <div class="popup-card">
        <i class="fas fa-trash-alt" style="font-size: 2rem; color: #cf6679; margin-bottom: 8px;"></i>
        <h3>Hapus proyek?</h3>
        <p id="deleteProjectTitle"></p>
        <div class="popup-buttons">
            <button class="btn-cancel" id="cancelDeleteBtn">Batal</button>
            <button class="btn-confirm" id="confirmDeleteBtn">Hapus</button>
        </div>
    </div>
</div>
<script>
    // ======================= INDEXEDDB WRAPPER =======================
    const DB_NAME = 'EpubSuiteDB';
    const DB_VERSION = 1;
    const PROJECTS_STORE = 'projects';
    const METADATA_STORE = 'metadata';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(PROJECTS_STORE)) {
                    const projectStore = db.createObjectStore(PROJECTS_STORE, { keyPath: 'id' });
                    projectStore.createIndex('lastEdited', 'lastEdited');
                }
                if (!db.objectStoreNames.contains(METADATA_STORE)) {
                    db.createObjectStore(METADATA_STORE, { keyPath: 'id' });
                }
            };
        });
    }

    async function getAllProjects() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readonly');
            const store = tx.objectStore(PROJECTS_STORE);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveProject(project) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readwrite');
            const store = tx.objectStore(PROJECTS_STORE);
            const request = store.put(project);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteProject(id) {
        const db = await openDB();
        await new Promise((resolve, reject) => {
            const tx = db.transaction(PROJECTS_STORE, 'readwrite');
            const store = tx.objectStore(PROJECTS_STORE);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
        // Hapus juga metadata
        const db2 = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db2.transaction(METADATA_STORE, 'readwrite');
            const store = tx.objectStore(METADATA_STORE);
            const request = store.delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function getMetadata(projectId) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(METADATA_STORE, 'readonly');
            const store = tx.objectStore(METADATA_STORE);
            const request = store.get(projectId);
            request.onsuccess = () => resolve(request.result || null);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveMetadata(metadata) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(METADATA_STORE, 'readwrite');
            const store = tx.objectStore(METADATA_STORE);
            const request = store.put(metadata);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ======================= RENDER =======================
    let currentProjects = [];

    async function loadAndRender() {
        currentProjects = await getAllProjects();
        renderProjects();
    }

    function renderProjects() {
        const container = document.getElementById('projectsGrid');
        if (currentProjects.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open" style="font-size: 2rem; margin-bottom: 12px; display: block;"></i><p>Belum ada proyek. Klik "Proyek Baru" untuk memulai.</p></div>`;
            updateStats([]);
            return;
        }
        let html = '';
        for (const proj of currentProjects) {
            const coverDataUrl = proj.coverDataUrl || null;
            const coverHtml = coverDataUrl ? `<img src="${coverDataUrl}" alt="cover" loading="lazy">` : `<div class="cover-placeholder"><i class="fas fa-book-open"></i><span style="font-size:0.7rem;">No Cover</span></div>`;
            let dateStr = proj.lastEdited ? new Date(proj.lastEdited).toLocaleDateString('id-ID') : (proj.createdAt ? proj.createdAt.slice(0,10) : '');
            html += `
                <div class="project-card" data-id="${proj.id}">
                    <div class="project-cover">${coverHtml}</div>
                    <div class="menu-dots" data-id="${proj.id}"><i class="fas fa-ellipsis-v"></i></div>
                    <div class="project-info">
                        <div class="project-title">${escapeHtml(proj.title)}</div>
                        <div class="project-meta"><span><i class="fas fa-layer-group"></i> ${proj.chapterCount || 0} bab</span><span><i class="far fa-calendar-alt"></i> ${dateStr || 'baru'}</span></div>
                    </div>
                </div>`;
        }
        container.innerHTML = html;
        updateStats(currentProjects);
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.menu-dots')) return;
                const id = card.dataset.id;
                if (id) openProject(id);
            });
        });
        document.querySelectorAll('.menu-dots').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                const project = currentProjects.find(p => p.id == id);
                if (project) showDeletePopup(project.id, project.title);
            });
        });
    }

    function updateStats(projects) {
        document.getElementById('totalProjects').innerText = projects.length;
        const totalChapters = projects.reduce((sum, p) => sum + (p.chapterCount || 0), 0);
        document.getElementById('totalChapters').innerText = totalChapters;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    // Popup delete
    let pendingDeleteId = null;
    function showDeletePopup(projectId, projectTitle) {
        pendingDeleteId = projectId;
        document.getElementById('deleteProjectTitle').innerText = `"${escapeHtml(projectTitle)}"`;
        document.getElementById('deletePopup').classList.add('active');
    }
    function hideDeletePopup() { document.getElementById('deletePopup').classList.remove('active'); pendingDeleteId = null; }
    async function confirmDelete() {
        if (pendingDeleteId) {
            await deleteProject(pendingDeleteId);
            hideDeletePopup();
            await loadAndRender();
        }
    }
    document.getElementById('cancelDeleteBtn').addEventListener('click', hideDeletePopup);
    document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
    document.getElementById('deletePopup').addEventListener('click', (e) => { if (e.target === document.getElementById('deletePopup')) hideDeletePopup(); });

    async function openProject(projectId) {
        localStorage.setItem('current_project_id', projectId);
        window.location.href = 'editor.html';
    }

    async function createNewProject() {
        const newId = Date.now().toString();
        const nowISO = new Date().toISOString();
        const newProject = {
            id: newId,
            title: 'Proyek Baru',
            createdAt: nowISO,
            chapterCount: 0,
            lastEdited: nowISO,
            coverDataUrl: null
        };
        await saveProject(newProject);
        const emptyMetadata = {
            id: newId,
            metadata: {
                mainTitle: 'Proyek Baru', subTitle: '', volume: '', creator: 'Penulis', language: 'id',
                identifier: 'urn:uuid:' + crypto.randomUUID(), date: nowISO.slice(0,10), publisher: '', description: '',
                subjects: '', collectionName: '', collectionNumber: '', extraTitles: [], contributors: []
            },
            babItems: [],
            coverImagePath: null,
            hasCoverXhtml: false,
            coverDataUrl: null,
            lastUpdated: nowISO
        };
        await saveMetadata(emptyMetadata);
        localStorage.setItem('current_project_id', newId);
        window.location.href = 'editor.html';
    }

    document.getElementById('newProjectBtn').addEventListener('click', createNewProject);
    loadAndRender();
</script>
</body>
</html>
